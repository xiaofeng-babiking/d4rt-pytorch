# D4RT Configuration for Azure ND96 Series (8x A100)
# Optimized for Standard_ND96asr_v4 or Standard_ND96amsr_A100_v4
#
# This config is for FULL paper reproduction with ViT-Giant encoder

# =============================================================================
# Model Configuration - Full Paper Setup
# =============================================================================
encoder: giant  # ViT-g (1B params) - paper's encoder
decoder_depth: 8
img_size: 224       # VideoMAE requires 224x224
num_frames: 48
patch_size: 9

# =============================================================================
# Training Configuration - 8x A100 80GB
# =============================================================================
# Effective batch = 2 * 4 * 8 = 64 (matches paper)
batch_size: 2
gradient_accumulation_steps: 4
num_queries: 2048

# Training schedule (paper)
steps: 500000
lr: 1.0e-4
min_lr: 1.0e-6
warmup_steps: 2500
weight_decay: 0.03
grad_clip: 10.0

# Memory settings for ViT-Giant
amp: true
gradient_checkpointing: true  # Required for ViT-g on 80GB
compile: false  # Compile can cause issues with checkpointing

# =============================================================================
# Loss Weights
# =============================================================================
lambda_3d: 1.0
lambda_2d: 0.1
lambda_vis: 0.1
lambda_disp: 0.1
lambda_normal: 0.5
lambda_conf: 0.2

# =============================================================================
# Data Configuration
# =============================================================================
dataset: kubric
num_workers: 12  # Per GPU, total 96 workers

# =============================================================================
# Checkpointing
# =============================================================================
save_freq: 5000
log_freq: 50
auto_resume: true

# =============================================================================
# Random Seed
# =============================================================================
seed: 42
